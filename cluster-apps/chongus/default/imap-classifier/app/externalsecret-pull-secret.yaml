---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: imap-classifier-pull-secret
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler
  target:
    name: imap-classifier-pull-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: '{"auths":{"ghcr.io":{"username":"{{ .ghcr_username }}","password":"{{ .ghcr_token }}","auth":"{{ printf "%s:%s" .ghcr_username .ghcr_token | b64enc }}"}}}'
  dataFrom:
    - extract:
        key: IMAP_CLASSIFIER
