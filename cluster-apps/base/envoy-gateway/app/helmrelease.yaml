---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: envoy-gateway
  # Gateway API CRDs are managed by the bootstrap helmfile (gateway-api-crds v1.5.1).
  # That chart installs safe-upgrades ValidatingAdmissionPolicy which blocks downgrading
  # CRDs below v1.5.0, so we must not let this chart manage them.
  install:
    crds: Skip
  upgrade:
    crds: Skip
  values:
    config:
      envoyGateway:
        extensionApis:
          enableEnvoyPatchPolicy: true
        provider:
          type: Kubernetes
          kubernetes:
            deploy:
              type: GatewayNamespace
    global:
      imageRegistry: mirror.gcr.io
